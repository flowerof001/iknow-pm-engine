<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 职场竞争力引擎 — 模型配置</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #0f1117; color: #e4e6eb; min-height: 100vh; }
  
  .header { background: linear-gradient(135deg, #1a1d2e 0%, #252840 100%); border-bottom: 1px solid #2d3148; padding: 24px 40px; }
  .header h1 { font-size: 22px; font-weight: 600; color: #fff; }
  .header p { font-size: 13px; color: #8890a8; margin-top: 4px; }

  .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

  .section { background: #181b29; border: 1px solid #2d3148; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .section-title { font-size: 16px; font-weight: 600; color: #63B3ED; margin-bottom: 4px; }
  .section-desc { font-size: 12px; color: #6b7280; margin-bottom: 20px; }

  .row { display: flex; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid #252840; }
  .row:last-child { border-bottom: none; }

  .row-label { min-width: 140px; }
  .row-label .title { font-size: 14px; font-weight: 500; color: #e4e6eb; }
  .row-label .hint { font-size: 11px; color: #6b7280; margin-top: 2px; }

  select { flex: 1; max-width: 420px; padding: 10px 14px; background: #252840; border: 1px solid #3d4260; border-radius: 8px; color: #e4e6eb; font-size: 13px; cursor: pointer; outline: none; transition: border-color .2s; }
  select:focus { border-color: #63B3ED; }

  .model-info { flex: 1; max-width: 280px; font-size: 11px; color: #6b7280; line-height: 1.5; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; margin-right: 4px; }
  .badge-green { background: #065f46; color: #6ee7b7; }
  .badge-blue { background: #1e3a5f; color: #63B3ED; }
  .badge-purple { background: #3b1f5e; color: #c084fc; }

  .actions { display: flex; gap: 12px; margin-top: 24px; }
  button { padding: 10px 24px; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .2s; }
  .btn-primary { background: #63B3ED; color: #0f1117; }
  .btn-primary:hover { background: #7ec4f7; }
  .btn-secondary { background: #252840; color: #e4e6eb; border: 1px solid #3d4260; }
  .btn-secondary:hover { background: #2d3148; }
  .btn-danger { background: transparent; color: #f87171; border: 1px solid #3d4260; }
  .btn-danger:hover { background: #3b1515; border-color: #f87171; }

  .toast { position: fixed; top: 24px; right: 24px; padding: 14px 24px; border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 1000; animation: slideIn .3s ease; }
  .toast-success { background: #065f46; color: #6ee7b7; border: 1px solid #10b981; }
  .toast-error { background: #5f0606; color: #f87171; border: 1px solid #ef4444; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .status { margin-top: 16px; padding: 12px 16px; border-radius: 8px; font-size: 12px; background: #1e2a1e; border: 1px solid #2d4a2d; color: #6ee7b7; }
  .status.error { background: #2a1e1e; border-color: #4a2d2d; color: #f87171; }

  .footer { text-align: center; padding: 24px; font-size: 11px; color: #4b5268; }
</style>
</head>
<body>

<div class="header">
  <h1>⚙️ AI 职场竞争力引擎 — 模型配置</h1>
  <p>按业务类型自定义选择文本生成和图片生成模型</p>
</div>

<div class="container" id="app">
  <div style="text-align:center;padding:40px;color:#6b7280;">加载中...</div>
</div>

<div class="footer">配置自动保存 · 修改即时生效 · AI 职场竞争力引擎 v2.0</div>

<script>
const API = '/api';

// ── 渲染 ──────────────────────────────────────────
async function load() {
  const app = document.getElementById('app');
  try {
    const [config, textModels, imageModels] = await Promise.all([
      fetch(API + '/config').then(r => r.json()),
      fetch(API + '/models/text').then(r => r.json()),
      fetch(API + '/models/image').then(r => r.json()),
    ]);
    render(config, textModels, imageModels);
  } catch (e) {
    app.innerHTML = `<div class="status error">加载失败: ${e.message}<br>请确认后台服务已启动: python3 admin/server.py</div>`;
  }
}

function render(config, textModels, imageModels) {
  const app = document.getElementById('app');
  
  // ── 文本生成 ──
  let textRows = '';
  for (const [key, biz] of Object.entries(config.text_generation)) {
    const detail = biz.model_detail || {};
    textRows += rowHTML('text_generation', key, biz, textModels, detail);
  }

  // ── 图片生成 ──
  let imageRows = '';
  for (const [key, biz] of Object.entries(config.image_generation)) {
    const detail = biz.model_detail || {};
    imageRows += rowHTML('image_generation', key, biz, imageModels, detail);
  }

  app.innerHTML = `
    <div class="section">
      <div class="section-title">📝 文本生成模型</div>
      <div class="section-desc">选择各语言文章使用的 LLM 模型</div>
      ${textRows}
    </div>

    <div class="section">
      <div class="section-title">🎨 图片生成模型</div>
      <div class="section-desc">选择各场景图片使用的文生图模型</div>
      ${imageRows}
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="saveAll()">💾 保存全部配置</button>
      <button class="btn-danger" onclick="resetConfig()">↩ 恢复默认</button>
    </div>

    <div id="status"></div>
  `;
}

function rowHTML(category, key, biz, models, detail) {
  const modelKey = biz.model_key;
  const cost = detail.cost_per_1k_tokens || detail.cost_per_image || '-';
  const params = detail.params || '-';
  const vendor = detail.vendor || '-';

  let options = '';
  for (const [mk, m] of Object.entries(models)) {
    const sel = mk === modelKey ? ' selected' : '';
    options += `<option value="${mk}"${sel}>${m.vendor} — ${m.name} (${m.params || '-'})</option>`;
  }

  return `
    <div class="row">
      <div class="row-label">
        <div class="title">${biz.label}</div>
        <div class="hint">${biz.description}</div>
      </div>
      <select onchange="onSelect('${category}', '${key}', this.value)" data-cat="${category}" data-key="${key}">
        ${options}
      </select>
      <div class="model-info">
        <span class="badge badge-green">${vendor}</span>
        <span class="badge badge-blue">${params}</span>
        <span class="badge badge-purple">${cost}</span>
      </div>
    </div>`;
}

// ── 交互 ──────────────────────────────────────────
const dirty = {};

function onSelect(category, key, value) {
  dirty[`${category}.${key}`] = value;
}

async function saveAll() {
  const selects = document.querySelectorAll('select[data-cat]');
  const status = document.getElementById('status');
  let saved = 0, failed = 0;

  for (const sel of selects) {
    const cat = sel.dataset.cat;
    const key = sel.dataset.key;
    const val = sel.value;

    if (!dirty[`${cat}.${key}`]) continue;

    try {
      const r = await fetch(API + '/config', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category: cat, business_type: key, model_key: val }),
      });
      if (r.ok) { saved++; delete dirty[`${cat}.${key}`]; }
      else failed++;
    } catch { failed++; }
  }

  if (saved > 0 || failed > 0) {
    status.innerHTML = `<div class="status${failed ? ' error' : ''}">✅ 已保存 ${saved} 项${failed ? ` · ❌ ${failed} 项失败` : ''}</div>`;
    setTimeout(() => status.innerHTML = '', 3000);
  } else {
    status.innerHTML = '<div class="status">无需保存，配置未变更</div>';
    setTimeout(() => status.innerHTML = '', 2000);
  }

  // 刷新展示
  if (saved > 0) setTimeout(load, 500);
}

async function resetConfig() {
  if (!confirm('确定恢复为默认模型配置？当前配置将被覆盖。')) return;
  try {
    await fetch(API + '/config/reset', { method: 'POST' });
    showToast('配置已恢复默认', 'success');
    load();
  } catch { showToast('重置失败', 'error'); }
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── 启动 ──
load();
</script>
</body>
</html>
